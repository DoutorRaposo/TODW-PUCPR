name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    branches: ["main"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup do ambiente
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências
        run: npm install

      - name: Gerar build de produção
        run: npm run build

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  docker:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/calculadora:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/calculadora:${{ github.sha }}

  notify-discord:
    runs-on: ubuntu-latest
    needs: [build, deploy, docker]
    if: always()
    steps:
      - name: Consolidar status
        id: status
        run: |
          if [[ "${{ needs.build.result }}" == "success" && "${{ needs.deploy.result }}" == "success" && "${{ needs.docker.result }}" == "success" ]]; then
            echo "result=success" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.build.result }}" == "cancelled" || "${{ needs.deploy.result }}" == "cancelled" || "${{ needs.docker.result }}" == "cancelled" ]]; then
            echo "result=cancelled" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
          fi

      - name: Enviar alerta ao Discord
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ steps.status.outputs.result }}
          title: "CD (Deploy) - ${{ github.repository }}"
          description: |
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Autor: ${{ github.actor }}
            Build: ${{ needs.build.result }} • Deploy: ${{ needs.deploy.result }} • Docker: ${{ needs.docker.result }}
          username: GitHub Actions
